<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
        name="viewport"
        content="width=device-width, initial-scale=1.0">

    <title>
        {% block title %}
        MediFlow AI
        {% endblock %}
    </title>

    <!-- Google Fonts -->

    <link
        rel="preconnect"
        href="https://fonts.googleapis.com">

    <link
        rel="preconnect"
        href="https://fonts.gstatic.com"
        crossorigin>

    <link
        href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap"
        rel="stylesheet">

    <!-- Font Awesome -->

    <link
        rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <!-- Bootstrap -->

    <link
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
        rel="stylesheet">

    <!-- Project CSS -->

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/landing.css') }}">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/auth.css') }}">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/dashboard.css') }}">

    <link
        rel="stylesheet"
        href="{{ url_for('static', filename='css/triage.css') }}">

    {% block extra_css %}
    {% endblock %}

</head>

<body>

    <!-- Flash Messages -->

    {% with messages = get_flashed_messages(with_categories=true) %}

        {% if messages %}

            <div class="flash-wrapper">

                {% for category, message in messages %}

                    <div class="alert alert-{{ category }} alert-dismissible fade show">

                        {{ message }}

                        <button
                            type="button"
                            class="btn-close"
                            data-bs-dismiss="alert">
                        </button>

                    </div>

                {% endfor %}

            </div>

        {% endif %}

    {% endwith %}

    <!-- Main Content -->

    {% block content %}
    {% endblock %}

    <!-- Bootstrap JS -->

    <script
        src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js">
    </script>

    <!-- Project JS -->

    <script
        src="{{ url_for('static', filename='js/dashboard.js') }}">
    </script>

    <script
        src="{{ url_for('static', filename='js/triage.js') }}">
    </script>

    <script
        src="{{ url_for('static', filename='js/charts.js') }}">
    </script>

    {% block extra_js %}
    {% endblock %}

</body>

</html>
