{% extends "base.html" %}

{% block content %}

<div class="auth-page">

```
<div class="auth-left">

    <h1>
        Welcome Back
    </h1>

    <p>
        Access your MediFlow AI account
        and manage your healthcare journey.
    </p>

</div>

<div class="auth-card">

    <h2>
        Login
    </h2>

    <form method="POST">

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button type="submit">

            Login

        </button>

    </form>

    <p class="auth-link">

        Don't have an account?

        <a href="/register">

            Register

        </a>

    </p>

</div>
```

</div>

{% endblock %}
