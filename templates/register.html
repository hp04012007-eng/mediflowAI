{% extends "base.html" %}

{% block content %}

<div class="auth-page">

```
<div class="auth-left">

    <h1>
        Join MediFlow AI
    </h1>

    <p>
        Create your account and
        experience AI-powered
        healthcare assistance.
    </p>

</div>

<div class="auth-card">

    <h2>
        Register
    </h2>

    <form method="POST">

        <input
            type="text"
            name="name"
            placeholder="Full Name"
            required>

        <input
            type="email"
            name="email"
            placeholder="Email Address"
            required>

        <input
            type="password"
            name="password"
            placeholder="Password"
            required>

        <button type="submit">

            Create Account

        </button>

    </form>

    <p class="auth-link">

        Already have an account?

        <a href="/login">

            Login

        </a>

    </p>

</div>
```

</div>

{% endblock %}
